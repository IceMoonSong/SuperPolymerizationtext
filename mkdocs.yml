site_name: 超融合——我的电子墓碑
site_description: 超融合·三部曲设定集
site_author: SuperPolymerizationtext

# GitHub 仓库信息
repo_name: SuperPolymerizationtext/SuperPolymerizationtext
repo_url: https://github.com/SuperPolymerizationtext/SuperPolymerizationtext

# 使用 Material for MkDocs 主题（Wiki 风格）
theme:
  name: material
  language: zh
  palette:
    # 浅色模式
    - scheme: default
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式
    - scheme: slate
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs           # 顶部导航标签
    - navigation.tabs.sticky    # 标签页固定
    - navigation.sections       # 侧边栏分组
    - navigation.expand         # 默认展开所有目录
    - navigation.indexes        # 允许目录有索引页
    - navigation.top            # 返回顶部按钮
    - search.suggest            # 搜索建议
    - search.highlight          # 搜索高亮
    - content.action.edit       # 编辑按钮
    - content.action.view       # 查看源文件
    - content.code.copy         # 代码复制按钮
    - content.tooltips          # 工具提示

# 启用搜索功能
plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

# Markdown 扩展
markdown_extensions:
  - admonition                  # 提示框
  - attr_list                   # 属性列表
  - def_list                    # 定义列表
  - footnotes                   # 脚注
  - meta                        # Meta 数据
  - md_in_html                  # HTML 中的 Markdown
  - toc:
      permalink: true           # 标题锚点
      permalink_title: 跳转到此标题
  - pymdownx.arithmatex:        # 数学公式
      generic: true
  - pymdownx.betterem:          # 更好的强调
  - pymdownx.caret:             # 上标
  - pymdownx.details:           # 可折叠详情
  - pymdownx.emoji:             # Emoji 支持
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:         # 代码高亮
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite:      # 行内代码高亮
  - pymdownx.keys:              # 键盘按键样式
  - pymdownx.magiclink:         # 自动链接
  - pymdownx.mark:              # 高亮标记
  - pymdownx.smartsymbols:      # 智能符号
  - pymdownx.snippets:          # 代码片段
  - pymdownx.superfences:       # 高级代码块
  - pymdownx.tabbed:            # 标签页
      alternate_style: true
  - pymdownx.tasklist:          # 任务列表
      custom_checkbox: true
  - pymdownx.tilde:             # 删除线

# 自定义 CSS
extra_css:
  - stylesheets/extra.css

