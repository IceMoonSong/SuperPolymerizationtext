name: pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build
        run: |
          npm ci
          npm run build   # 请根据你的项目替换为实际 build 命令
          # 假定输出目录是 ./build ，若你的输出是 ./dist 请相应修改下面的 path

      - name: Debug build output
        run: |
          echo "---- pwd ----"
          pwd
          echo "---- ls -la (root) ----"
          ls -la
          echo "---- ls -la build ----"
          ls -la ./build || true
          echo "---- head index.html ----"
          head -n 20 ./build/index.html || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./build    # <-- 确认这里和上面实际输出目录一致（./dist 或 ./build）

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

      - name: Poll Pages deployment status (diagnostic, optional)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 12); do
            echo "Attempt $i: fetching pages deployment status..."
            resp=$(curl -sSL -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/pages/deployment")
            echo "$resp" | jq '.' || echo "$resp"
            state=$(echo "$resp" | jq -r '.state // empty')
            echo "state=$state"
            if [ "$state" = "built" ] || [ "$state" = "ready" ]; then
              echo "Pages deployed successfully"
              exit 0
            fi
            sleep 10
          done
          echo "Pages deployment did not reach ready state after polling." >&2
          exit 1
