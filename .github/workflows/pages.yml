name: pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and build
        run: |
          set -euo pipefail
          echo "WORKDIR: $(pwd)"

          # Helper to consolidate any output dir into ./build
          consolidate_to_build() {
            rm -rf ./build
            mkdir -p ./build
            src="$1"
            if [ -d "$src" ]; then
              echo "Copying $src -> ./build"
              cp -a "$src"/. ./build/ || true
            fi
          }

          # 1) Node 项目（根目录有 package.json）
          if [ -f package.json ]; then
            echo "Detected Node project (package.json present)."
            if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
              echo "Using npm ci (lockfile present)"
              npm ci
            else
              echo "No lockfile found — using npm install (consider committing package-lock.json for reproducible builds)"
              npm install
            fi

            echo "Running npm run build..."
            npm run build || true

            # common output places for Node builds
            if [ -d ./build ]; then
              echo "Found ./build after Node build."
            elif [ -d ./dist ]; then
              consolidate_to_build ./dist
            elif [ -d ./public ]; then
              consolidate_to_build ./public
            fi

            if [ -d ./build ]; then
              echo "Final build is in ./build"
              ls -la ./build || true
              exit 0
            fi
          fi

          # 2) Jekyll 网站（有 _config.yml 或 index.md）
          if [ -f _config.yml ] || [ -f index.md ] || [ -d _posts ]; then
            echo "Detected Jekyll site. Will build with Jekyll."

            # install ruby & jekyll if not present
            sudo apt-get update -y
            sudo apt-get install -y ruby-full build-essential zlib1g-dev
            export GEM_HOME="$HOME/gems"
            export PATH="$HOME/gems/bin:$PATH"
            gem install bundler jekyll --no-document || true

            if [ -f Gemfile ]; then
              bundle config set --local path 'vendor/bundle'
              bundle install --jobs 4 || true
              bundle exec jekyll build -d ./_site || true
            else
              jekyll build -d ./_site || true
            fi

            if [ -d ./_site ]; then
              consolidate_to_build ./_site
              echo "Jekyll build -> ./build ready."
              ls -la ./build || true
              exit 0
            fi
          fi

          # 3) 已存在静态输出（无需构建）
          if [ -d ./build ]; then
            echo "Found existing ./build directory. Using it directly."
            ls -la ./build || true
            exit 0
          fi
          if [ -d ./dist ]; then
            consolidate_to_build ./dist
            echo "Using ./dist copied to ./build"
            ls -la ./build || true
            exit 0
          fi
          if [ -d ./public ]; then
            consolidate_to_build ./public
            echo "Using ./public copied to ./build"
            ls -la ./build || true
            exit 0
          fi

          # 4) 没有检测到任何可构建或可上传的内容：失败并给出建议
          echo "ERROR: No build configuration or output detected."
          echo "Repository root does not contain package.json (Node), _config.yml (Jekyll), nor an existing ./build ./dist ./public directory."
          echo "Possible fixes:"
          echo "  - If this is a Node site, add package.json to repo root (and package-lock.json for npm ci), or adjust the workflow to cd into the subdirectory containing them."
          echo "  - If this is a Jekyll site, enable GitHub Pages built-in builder or add a Gemfile and let this workflow run jekyll build;"
          echo "  - If this repository already contains static site HTML, ensure those files are in ./build, ./dist or ./public."
          ls -la
          exit 1

      - name: Debug build output
        run: |
          echo "---- pwd ----"
          pwd
          echo "---- node & npm versions ----"
          node --version || true
          npm --version || true
          echo "---- ls -la (root) ----"
          ls -la
          echo "---- ls -la build ----"
          ls -la ./build || true
          echo "---- sample index (if any) ----"
          head -n 20 ./build/index.html || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2

      - name: Poll Pages deployment status (diagnostic, optional)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 12); do
            echo "Attempt $i: fetching pages deployment status..."
            resp=$(curl -sSL -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/pages/deployment")
            echo "$resp" | jq '.' || echo "$resp"
            state=$(echo "$resp" | jq -r '.state // empty')
            echo "state=$state"
            if [ "$state" = "built" ] || [ "$state" = "ready" ]; then
              echo "Pages deployed successfully"
              exit 0
            fi
            sleep 10
          done
          echo "Pages deployment did not reach ready state after polling." >&2
          exit 1
